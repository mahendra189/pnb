# ═══════════════════════════════════════════════════════════════════════════════
# k8s/configmap.yaml — Non-sensitive application configuration
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name:      pqss-config
  namespace: pqss
  labels:
    app: pqss
data:
  # ── Application ────────────────────────────────────────────────────────────
  APP_ENV:             "production"
  APP_LOG_LEVEL:       "info"
  APP_VERSION:         "1.0.0"
  WORKERS_COUNT:       "4"
  CELERY_TASK_TIME_LIMIT:  "3600"

  # ── Database hostnames (credentials come from Secret) ─────────────────────
  POSTGRES_HOST:       "postgres-service"
  POSTGRES_PORT:       "5432"
  POSTGRES_DB:         "pqss_db"
  NEO4J_HOST:          "neo4j-service"
  NEO4J_BOLT_PORT:     "7687"

  # ── Redis / Celery ─────────────────────────────────────────────────────────
  REDIS_HOST:          "redis-service"
  REDIS_PORT:          "6379"
  CELERY_BROKER_DB:    "1"
  CELERY_RESULT_DB:    "2"

  # ── CORS / API ─────────────────────────────────────────────────────────────
  CORS_ORIGINS:        '["https://pqss.pnb.co.in"]'
  API_V1_PREFIX:       "/api/v1"
  DOCS_ENABLED:        "false"   # Disable Swagger in production

  # ── TLS Scan defaults ──────────────────────────────────────────────────────
  SCAN_TIMEOUT_SECS:   "30"
  SSLYZE_CONCURRENT:   "10"
  MAX_SCAN_QUEUE_SIZE: "1000"

  # ── HNDL / ML ─────────────────────────────────────────────────────────────
  CRQC_ARRIVAL_YEAR:               "2033"
  HNDL_SCORE_RECALC_INTERVAL_SECS: "3600"

  # ── Approval gate ─────────────────────────────────────────────────────────
  APPROVAL_BACKEND:    "servicenow"    # "servicenow" | "jira" | "mock"
  APPROVAL_TIMEOUT_HOURS: "24"

---
# ═══════════════════════════════════════════════════════════════════════════════
# k8s/secrets.yaml — Sealed/Vault-referenced secrets
# ═══════════════════════════════════════════════════════════════════════════════
#
# ⚠ DO NOT commit real secrets to version control.
#
# In production, these values are injected by ONE of:
#   a) HashiCorp Vault Agent Injector (vault.hashicorp.com annotations)
#   b) External Secrets Operator (external-secrets.io CRD)
#   c) Sealed Secrets (kubeseal — values are encrypted at rest in the repo)
#
# This file contains *** PLACEHOLDER *** base64 values for reference only.
# Generate real values with:
#   echo -n "your-secret" | base64
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name:      pqss-secrets
  namespace: pqss
  labels:
    app: pqss
  annotations:
    # Vault Agent Injector annotation (if using HashiCorp Vault)
    vault.hashicorp.com/agent-inject:                      "true"
    vault.hashicorp.com/role:                              "pqss-backend"
    vault.hashicorp.com/agent-inject-secret-db-password:   "secret/pqss/database"
    vault.hashicorp.com/agent-inject-template-db-password: |
      {{- with secret "secret/pqss/database" -}}
      {{ .Data.data.POSTGRES_PASSWORD }}
      {{- end }}
type: Opaque
data:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  POSTGRES_USER:      cHFzcw==          # base64("pqss") — REPLACE
  POSTGRES_PASSWORD:  Q0hBTkdFTUU=      # base64("CHANGEME") — REPLACE

  # ── Neo4j ─────────────────────────────────────────────────────────────────
  NEO4J_PASSWORD:     Q0hBTkdFTUU=      # REPLACE

  # ── Redis ─────────────────────────────────────────────────────────────────
  REDIS_PASSWORD:     Q0hBTkdFTUU=      # REPLACE

  # ── JWT ───────────────────────────────────────────────────────────────────
  JWT_SECRET_KEY:     UkVQTEFDRV9XSVRIX0EtMjU2QEVBVF9SQU5ET01fU0VDUkVU  # REPLACE

  # ── External API keys ──────────────────────────────────────────────────────
  SHODAN_API_KEY:             c2hvZGFuX2tleV9oZXJl   # REPLACE
  SERVICENOW_PASSWORD:        c25vd19wd2Q=             # REPLACE
  JIRA_API_TOKEN:             amlyYV90b2tlbg==          # REPLACE

  # ── Flower UI credentials ─────────────────────────────────────────────────
  FLOWER_USER:        YWRtaW4=          # base64("admin")
  FLOWER_PASSWORD:    Q0hBTkdFTUU=      # REPLACE

---
# ═══════════════════════════════════════════════════════════════════════════════
# External Secrets Operator alternative (ESO CRD)
# Syncs secrets from AWS Secrets Manager / GCP Secret Manager / Vault
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name:      pqss-external-secrets
  namespace: pqss
spec:
  refreshInterval: 1h
  secretStoreRef:
    name:  vault-backend          # Name of your ClusterSecretStore
    kind:  ClusterSecretStore
  target:
    name:            pqss-secrets
    creationPolicy:  Owner
  data:
    - secretKey:  POSTGRES_PASSWORD
      remoteRef:
        key:      secret/pqss/database
        property: POSTGRES_PASSWORD
    - secretKey:  NEO4J_PASSWORD
      remoteRef:
        key:      secret/pqss/database
        property: NEO4J_PASSWORD
    - secretKey:  REDIS_PASSWORD
      remoteRef:
        key:      secret/pqss/redis
        property: REDIS_PASSWORD
    - secretKey:  JWT_SECRET_KEY
      remoteRef:
        key:      secret/pqss/app
        property: JWT_SECRET_KEY
    - secretKey:  SHODAN_API_KEY
      remoteRef:
        key:      secret/pqss/external-apis
        property: SHODAN_API_KEY
