# ═══════════════════════════════════════════════════════════════════════════════
# Quantum-Proof Systems Scanner — docker-compose.yml
# PSB Hackathon 2026 | Production-like multi-service orchestration
# ═══════════════════════════════════════════════════════════════════════════════
#
# NETWORK TOPOLOGY (DMZ simulation):
#
#   ┌───────────────────────────────────┐           ┌─────────────────────┐
#   │       dmz-network                 │           │   data-network      │
#   │  (public / internet facing)       │           │ (isolated / private)│
#   │                                   │           │                     │
#   │  react-frontend   :443 ─────────────────►  fastapi-backend :8000   │
#   │                                   │           │        │            │
#   └───────────────────────────────────┘           │  celery-worker(s)  │
#                                                   │        │            │
#                                                   │   redis :6379       │
#                                                   │   postgres :5432    │
#                                                   │   neo4j :7687/7474  │
#                                                   │   flower :5555      │
#                                                   └─────────────────────┘
#
# Databases and Redis are NOT exposed to the dmz-network — they are
# only reachable from the data-network (backend + workers).
#
# Usage:
#   cp .env.example .env && docker compose up --build -d
# ═══════════════════════════════════════════════════════════════════════════════

version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Named Volumes  (persistent data — survives container restarts)
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_import:
    driver: local
  redis_data:
    driver: local
  nginx_certs:
    driver: local

# ─────────────────────────────────────────────────────────────────────────────
# Networks  (DMZ isolation)
# ─────────────────────────────────────────────────────────────────────────────
networks:
  # Public-facing tier (frontend ↔ backend)
  dmz:
    driver: bridge
    ipam:
      config:
        - subnet: "172.20.0.0/24"
    driver_opts:
      com.docker.network.bridge.name: "pqss-dmz"

  # Private data tier (backend ↔ workers ↔ databases)
  data:
    driver: bridge
    internal: true          # Blocks all external traffic to this network
    ipam:
      config:
        - subnet: "172.21.0.0/24"
    driver_opts:
      com.docker.network.bridge.name: "pqss-data"

# ─────────────────────────────────────────────────────────────────────────────
# Services
# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── 1. PostgreSQL 15 ────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    container_name: pqss-postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-pqss}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-pqss_db}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pqss} -d ${POSTGRES_DB:-pqss_db}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 20s
    # No ports exposed externally — data-network only
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  # ── 2. Neo4j 5.x ───────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    restart: unless-stopped
    container_name: pqss-neo4j
    environment:
      NEO4J_AUTH:                     ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS:                  '["apoc"]'
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size:    "1G"
      NEO4J_server_memory_pagecache__size:   "512m"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist:    "apoc.*"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/import
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout:  10s
      retries:  5
      start_period: 30s
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  # ── 3. Redis (Celery broker + result backend) ──────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    container_name: pqss-redis
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --maxmemory   256mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --appendfilename "pqss.aof"
    volumes:
      - redis_data:/data
    networks:
      - data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout:  3s
      retries:  5
    logging:
      driver: "json-file"
      options: { max-size: "5m", max-file: "3" }

  # ── 4. FastAPI Backend (Uvicorn) ───────────────────────────────────────────
  fastapi-backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
      target:     production
    image: pqss/fastapi-backend:${IMAGE_TAG:-latest}
    container_name: pqss-api
    restart: unless-stopped
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --workers 4
        --loop uvloop
        --http httptools
        --no-access-log
        --proxy-headers
        --forwarded-allow-ips "*"
    env_file: .env
    environment:
      # Override inside container — use service names as hostnames
      DATABASE_URL:  "postgresql+asyncpg://${POSTGRES_USER:-pqss}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pqss_db}"
      NEO4J_URI:     "bolt://neo4j:7687"
      REDIS_URL:     "redis://:${REDIS_PASSWORD}@redis:6379/0"
      CELERY_BROKER: "redis://:${REDIS_PASSWORD}@redis:6379/1"
      CELERY_RESULT: "redis://:${REDIS_PASSWORD}@redis:6379/2"
    volumes:
      - ./backend:/app:ro       # Read-only bind mount for hot-reload dev override
    networks:
      - dmz
      - data
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout:  5s
      retries:  5
      start_period: 20s
    deploy:
      resources:
        limits:   { cpus: "2.0", memory: "1G" }
        reservations: { cpus: "0.5", memory: "256M" }
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "5" }

  # ── 5. Celery Worker (Scan + ML inference) ─────────────────────────────────
  celery-worker:
    build:
      context:    ./backend
      dockerfile: Dockerfile
      target:     production
    image: pqss/fastapi-backend:${IMAGE_TAG:-latest}
    container_name: pqss-celery-worker
    restart: unless-stopped
    command: >
      celery -A workers.celery_app worker
        --loglevel=info
        --concurrency=4
        --queues=discovery,scanning,ai
        --max-tasks-per-child=100
        --without-gossip
        --without-mingle
    env_file: .env
    environment:
      DATABASE_URL:  "postgresql+asyncpg://${POSTGRES_USER:-pqss}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pqss_db}"
      NEO4J_URI:     "bolt://neo4j:7687"
      REDIS_URL:     "redis://:${REDIS_PASSWORD}@redis:6379/0"
      CELERY_BROKER: "redis://:${REDIS_PASSWORD}@redis:6379/1"
      CELERY_RESULT: "redis://:${REDIS_PASSWORD}@redis:6379/2"
    networks:
      - data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    # Scale horizontally: docker compose up --scale celery-worker=4
    deploy:
      replicas: 2
      resources:
        limits:   { cpus: "2.0", memory: "2G" }
        reservations: { cpus: "0.5", memory: "512M" }
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "5" }

  # ── 6. Celery Beat (Scheduled tasks) ──────────────────────────────────────
  celery-beat:
    build:
      context:    ./backend
      dockerfile: Dockerfile
      target:     production
    image: pqss/fastapi-backend:${IMAGE_TAG:-latest}
    container_name: pqss-celery-beat
    restart: unless-stopped
    command: >
      celery -A workers.celery_app beat
        --loglevel=info
        --scheduler celery.beat:PersistentScheduler
        --schedule /tmp/celerybeat-schedule
    env_file: .env
    environment:
      DATABASE_URL:  "postgresql+asyncpg://${POSTGRES_USER:-pqss}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pqss_db}"
      REDIS_URL:     "redis://:${REDIS_PASSWORD}@redis:6379/0"
      CELERY_BROKER: "redis://:${REDIS_PASSWORD}@redis:6379/1"
      CELERY_RESULT: "redis://:${REDIS_PASSWORD}@redis:6379/2"
    networks:
      - data
    depends_on:
      - redis
      - fastapi-backend
    deploy:
      replicas: 1   # Exactly 1 beat scheduler — never scale this
    logging:
      driver: "json-file"
      options: { max-size: "5m", max-file: "3" }

  # ── 7. Flower (Celery monitoring UI) ──────────────────────────────────────
  flower:
    image: mher/flower:2.0
    container_name: pqss-flower
    restart: unless-stopped
    command: >
      celery --broker=redis://:${REDIS_PASSWORD}@redis:6379/1 flower
        --port=5555
        --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-changeme}
        --url_prefix=/flower
    env_file: .env
    networks:
      - data
      - dmz
    depends_on:
      - redis
    ports:
      - "127.0.0.1:5555:5555"   # Bind to loopback only (reached via SSH tunnel/Nginx)
    logging:
      driver: "json-file"
      options: { max-size: "5m", max-file: "2" }

  # ── 8. React Frontend (Nginx reverse proxy) ───────────────────────────────
  react-frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    image: pqss/react-frontend:${IMAGE_TAG:-latest}
    container_name: pqss-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx_certs:/etc/nginx/certs:ro
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - dmz
    depends_on:
      fastapi-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }
