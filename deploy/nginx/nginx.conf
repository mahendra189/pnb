# Nginx reverse proxy — production config for PQSS frontend
# Placed at: deploy/nginx/nginx.conf

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Upstream (FastAPI backend) ─────────────────────────────────────────
    upstream fastapi {
        server fastapi-backend:8000;
        keepalive 32;
    }

    # ── Rate limiting ──────────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr  zone=api_limit:10m  rate=30r/s;
    limit_conn_zone $binary_remote_addr  zone=conn_limit:10m;

    # ── HTTP → HTTPS redirect ──────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS main server ──────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name pqss.pnb.co.in;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" always;

        # ── Static React build ─────────────────────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── FastAPI REST API proxy ─────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            limit_conn conn_limit 20;

            proxy_pass         http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_buffering    off;   # Required for WebSocket + SSE
        }

        # ── Flower monitoring (internal use) ──────────────────────────────
        location /flower/ {
            allow 10.0.0.0/8;
            deny  all;
            proxy_pass http://flower:5555/;
        }
    }
}
